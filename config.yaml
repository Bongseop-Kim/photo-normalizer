canvas:
  width: 1000
  height: 1000
  background: "#FFFFFF"

color_management:
  srgb_convert: true
  icc_profile: "assets/profiles/sRGB_IEC61966-2-1.icc"
  strip_exif: true
  preserve_icc: true

framing:
  target_ratio: 0.80
  max_upscale: 1.3

brightness:
  method: "level"
  reference: "median"
  target: "background"
  corner_sample_size: 100

angle:
  enabled: true
  reference: "median"
  tolerance: 2.0

morphology:
  enabled: false
  operation: "open"
  kernel_size: 3

trim:
  fuzz: "10%"
